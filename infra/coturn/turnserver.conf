# coturn for Watch Party — long-term credentials with one static user.
# Wire the same values into the web service env:
#   TURN_URL=turn:YOUR_VPS_IP_OR_DOMAIN:3478
#   TURN_USERNAME=watchparty
#   TURN_CREDENTIAL=<the password below>

listening-port=3478
fingerprint
lt-cred-mech
realm=watchparty
user=watchparty:CHANGE_ME_TURN_PASSWORD

# Relay port range — open these (UDP) plus 3478 (TCP+UDP) in the VPS firewall.
min-port=49160
max-port=49200

# Cloud instances usually sit behind 1:1 NAT — set the public IP here.
# external-ip=YOUR_PUBLIC_IP

# Keep the relay from being abused as an open proxy.
no-multicast-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
